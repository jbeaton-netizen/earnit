<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EarnIt - Creative Focus Tracker</title>
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --accent-teal: #0d9488;
            --accent-orange: #f97316;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .app-container {
            width: 100%;
            max-width: 450px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .status-card {
            background-color: var(--card-bg);
            border-radius: 16px;
            padding: 24px;
            text-align: center;
            border: 2px solid var(--accent-orange);
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
            transition: all 0.3s ease;
        }

        .status-card.unlocked {
            border-color: var(--accent-teal);
        }

        .timer-display {
            font-size: 3.5rem;
            font-weight: 800;
            margin: 12px 0;
            letter-spacing: -0.05em;
        }

        .upload-section {
            background-color: var(--card-bg);
            border-radius: 16px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        /* Dual Input Buttons */
        .input-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .action-select-btn {
            background-color: #0f172a;
            border: 1px solid #334155;
            color: var(--text-main);
            font-weight: 600;
            border-radius: 12px;
            padding: 16px 8px;
            text-align: center;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.2s;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
        }

        .action-select-btn:active {
            transform: scale(0.97);
            background-color: #1e293b;
        }

        /* Preview area */
        .preview-img {
            width: 100%;
            max-height: 250px;
            object-fit: cover;
            border-radius: 12px;
            display: none;
            border: 1px solid #334155;
        }

        textarea {
            background-color: #0f172a;
            border: 1px solid #334155;
            color: var(--text-main);
            border-radius: 12px;
            padding: 14px;
            font-family: inherit;
            resize: none;
            height: 90px;
            font-size: 0.95rem;
        }

        textarea:focus {
            outline: none;
            border-color: var(--accent-teal);
        }

        button.action-btn {
            background-color: var(--accent-teal);
            color: white;
            border: none;
            border-radius: 12px;
            padding: 16px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
        }

        button.action-btn:disabled {
            background-color: #334155;
            color: #64748b;
            cursor: not-allowed;
        }

        .archive-section {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .log-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }

        .log-card {
            background-color: var(--card-bg);
            border-radius: 12px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            box-shadow: 0 2px 4px rgb(0 0 0 / 0.1);
        }

        .log-card img {
            width: 100%;
            height: 120px;
            object-fit: cover;
        }

        .log-details {
            padding: 10px;
            font-size: 0.8rem;
        }

        .log-date {
            color: var(--accent-teal);
            font-weight: 600;
            font-size: 0.75rem;
            margin-bottom: 4px;
        }

        /* Diagnostic Panel */
        .debug-panel {
            background-color: #451a1a;
            border: 1px solid #f87171;
            color: #fecaca;
            border-radius: 12px;
            padding: 14px;
            font-size: 0.8rem;
            display: none;
            flex-direction: column;
            gap: 8px;
        }
    </style>
</head>
<body>

<div class="app-container">
    <div id="debugPanel" class="debug-panel">
        <strong>⚠️ App Diagnostic Log:</strong>
        <div id="debugText" style="word-break: break-all; white-space: pre-wrap;"></div>
        <button onclick="document.getElementById('debugPanel').style.display='none'" style="background: #ef4444; color: white; border: none; padding: 6px; border-radius: 6px; font-weight: bold; cursor: pointer;">Dismiss Log</button>
    </div>

    <div id="statusCard" class="status-card">
        <h2 id="statusTitle">Distractions Locked</h2>
        <div id="timerDisplay" class="timer-display">15:00</div>
        <p id="statusMsg" style="color: var(--text-muted); margin: 0;">Submit an art proof to earn 15 minutes.</p>
    </div>

    <div id="uploadSection" class="upload-section">
        <h3 style="font-size: 1.1rem; font-weight: 700;">Submit Studio Progress</h3>
        
        
        <div class="input-row">
            <div id="cameraBtn" class="action-select-btn">
                <span style="font-size: 1.5rem;">📷</span>
                <span>Take Live Photo</span>
            </div>
            <div id="galleryBtn" class="action-select-btn">
                <span style="font-size: 1.5rem;">🖼️</span>
                <span>Upload Gallery</span>
            </div>
        </div>

        <input type="file" id="camera-input" accept="image/*" capture="environment" style="display: none;">
        <input type="file" id="gallery-input" accept="image/*" style="display: none;">
        
        <img id="preview" class="preview-img" alt="Progress preview">
        <textarea id="description" placeholder="What are you working on right now?"></textarea>
        <button id="submitBtn" class="action-btn" disabled>Submit Proof & Unlock</button>
    </div>

    <div class="archive-section">
        <h3 style="font-size: 1.1rem; font-weight: 700;">On-Device Studio Archive</h3>
        <div id="logGrid" class="log-grid"></div>
    </div>
</div>

<script>
    let timerInterval;
    let unlockEndTime;
    let currentImgBase64 = null;

    const cameraInput = document.getElementById('camera-input');
    const galleryInput = document.getElementById('gallery-input');
    const cameraBtn = document.getElementById('cameraBtn');
    const galleryBtn = document.getElementById('galleryBtn');
    
    const preview = document.getElementById('preview');
    const descriptionInput = document.getElementById('description');
    const submitBtn = document.getElementById('submitBtn');
    const statusCard = document.getElementById('statusCard');
    const statusTitle = document.getElementById('statusTitle');
    const timerDisplay = document.getElementById('timerDisplay');
    const statusMsg = document.getElementById('statusMsg');
    const logGrid = document.getElementById('logGrid');
    const debugPanel = document.getElementById('debugPanel');
    const debugText = document.getElementById('debugText');

    function logError(msg) {
        debugPanel.style.display = 'flex';
        debugText.textContent = msg;
        console.error(msg);
    }

    // Direct actions to bypass PWA labels bubbling bugs on iOS Safari
    cameraBtn.addEventListener('click', () => {
        cameraInput.click();
    });

    galleryBtn.addEventListener('click', () => {
        galleryInput.click();
    });

    // Auto-save description on type to survive potential low RAM background reloads
    descriptionInput.addEventListener('input', () => {
        localStorage.setItem('temp_desc', descriptionInput.value);
        validateForm();
    });

    cameraInput.addEventListener('change', handleImageSelection);
    galleryInput.addEventListener('change', handleImageSelection);

    function handleImageSelection(e) {
        const file = e.target.files[0];
        if (file) {
            cameraBtn.innerHTML = "<span>⚙&#xFE0F;</span><span>Processing...</span>";
            galleryBtn.innerHTML = "<span>⚙&#xFE0F;</span><span>Processing...</span>";
            
            // Progressive File Reader prevents sandbox breaks by reading raw stream first
            const reader = new FileReader();
            reader.onload = function(event) {
                const rawDataUrl = event.target.result;
                
                // Compress via off-screen Canvas
                const img = new Image();
                img.onload = function() {
                    try {
                        const canvas = document.createElement('canvas');
                        let width = img.width;
                        let height = img.height;
                        const MAX_WIDTH = 500; 
                        const MAX_HEIGHT = 500;
                        
                        if (width > height) {
                            if (width > MAX_WIDTH) {
                                height *= MAX_WIDTH / width;
                                width = MAX_WIDTH;
                            }
                        } else {
                            if (height > MAX_HEIGHT) {
                                width *= MAX_HEIGHT / height;
                                height = MAX_HEIGHT;
                            }
                        }
                        
                        canvas.width = width;
                        canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, width, height);
                        
                        currentImgBase64 = canvas.toDataURL('image/jpeg', 0.55); // High density compression
                        
                        // Save backup immediately to bypass low RAM reboots
                        try {
                            localStorage.setItem('temp_img', currentImgBase64);
                        } catch (quotaErr) {
                            console.warn("Cleared old log due to local storage quota bounds.");
                            let tempLogs = JSON.parse(localStorage.getItem('studioLogs')) || [];
                            if (tempLogs.length > 0) {
                                tempLogs.pop();
                                localStorage.setItem('studioLogs', JSON.stringify(tempLogs));
                            }
                            localStorage.setItem('temp_img', currentImgBase64);
                        }

                        preview.src = currentImgBase64;
                        preview.style.display = 'block';
                        
                        cameraBtn.innerHTML = "<span>📷</span><span>Retake Photo</span>";
                        galleryBtn.innerHTML = "<span>🖼️</span><span>Change Photo</span>";
                        validateForm();
                    } catch (canvasErr) {
                        logError("Canvas compression fell back to legacy layout: " + canvasErr.message);
                        legacyFallback(rawDataUrl);
                    }
                };
                img.onerror = function() {
                    logError("Could not translate streaming package to canvas. Executing fallback.");
                    legacyFallback(rawDataUrl);
                };
                img.src = rawDataUrl;
            };
            reader.onerror = function() {
                logError("Hardware read error on selected stream. File might be protected by system.");
            };
            reader.readAsDataURL(file);
        }
    }

    function legacyFallback(dataUrl) {
        currentImgBase64 = dataUrl;
        preview.src = currentImgBase64;
        preview.style.display = 'block';
        cameraBtn.innerHTML = "<span>📷</span><span>Retake Photo</span>";
        galleryBtn.innerHTML = "<span>🖼️</span><span>Change Photo</span>";
        validateForm();
    }

    function validateForm() {
        submitBtn.disabled = !(currentImgBase64 && descriptionInput.value.trim().length > 0);
    }

    submitBtn.addEventListener('click', () => {
        try {
            if (!currentImgBase64 || !descriptionInput.value.trim()) return;

            const now = new Date();
            const dateStr = now.toLocaleDateString() + ' ' + now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

            const newLog = {
                id: Date.now(),
                date: dateStr,
                image: currentImgBase64,
                description: descriptionInput.value.trim()
            };

            saveLogToLocalStorage(newLog);
            startUnlockTimer();
            resetForm();
        } catch (submitErr) {
            logError("Submit action triggered exception: " + submitErr.message);
        }
    });

    function resetForm() {
        currentImgBase64 = null;
        preview.style.display = 'none';
        preview.src = '';
        cameraBtn.innerHTML = "<span>📷</span><span>Take Live Photo</span>";
        galleryBtn.innerHTML = "<span>🖼️</span><span>Upload Gallery</span>";
        descriptionInput.value = '';
        submitBtn.disabled = true;
        cameraInput.value = '';
        galleryInput.value = '';
        localStorage.removeItem('temp_desc');
        localStorage.removeItem('temp_img');
    }

    function startUnlockTimer() {
        clearInterval(timerInterval);
        statusCard.classList.add('unlocked');
        statusTitle.textContent = "Distractions Unlocked";
        statusMsg.textContent = "Enjoy your 15-minute break window.";
        
        unlockEndTime = Date.now() + (15 * 60 * 1000);
        localStorage.setItem('unlockEndTime', unlockEndTime);

        updateTimerUI();
        timerInterval = setInterval(updateTimerUI, 1000);
    }

    function updateTimerUI() {
        const remaining = unlockEndTime - Date.now();

        if (remaining <= 0) {
            clearInterval(timerInterval);
            statusCard.classList.remove('unlocked');
            statusTitle.textContent = "Distractions Locked";
            timerDisplay.textContent = "15:00";
            statusMsg.textContent = "Submit an art proof to earn 15 minutes.";
            localStorage.removeItem('unlockEndTime');
            return;
        }

        const minutes = Math.floor(remaining / 60000);
        const seconds = Math.floor((remaining % 60000) / 1000);
        timerDisplay.textContent = `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
    }

    function saveLogToLocalStorage(log) {
        let logs = JSON.parse(localStorage.getItem('studioLogs')) || [];
        logs.unshift(log);
        
        try {
            localStorage.setItem('studioLogs', JSON.stringify(logs));
        } catch (e) {
            logError("Local storage bounds hit. Auto-discharging legacy logs.");
            if (logs.length > 1) {
                logs.pop(); // Discard oldest entries
                try {
                    localStorage.setItem('studioLogs', JSON.stringify(logs));
                } catch (retryErr) {
                    logError("Severe LocalStorage block: " + retryErr.message);
                }
            }
        }
        renderLogs();
    }

    function renderLogs() {
        try {
            let logs = JSON.parse(localStorage.getItem('studioLogs')) || [];
            logGrid.innerHTML = '';
            
            logs.forEach(log => {
                const card = document.createElement('div');
                card.className = 'log-card';
                card.innerHTML = `
                    
                    
                        ${log.date}
                        ${escapeHtml(log.description)}
                    
                `;
                // Standard appender fix prevents structural engine breakdown
                logGrid.appendChild(card);
            });
        } catch (renderErr) {
            logError("Archive render failed: " + renderErr.message);
        }
    }

    function escapeHtml(text) {
        return text.replace(/&/g, "&").replace(//g, ">");
    }

    window.addEventListener('DOMContentLoaded', () => {
        // Self-repair wipes out structure if corrupted by legacy prototype builds
        try {
            const rawLogs = localStorage.getItem('studioLogs');
            if (rawLogs) {
                const parsed = JSON.parse(rawLogs);
                if (!Array.isArray(parsed)) throw new Error();
            }
        } catch (repairErr) {
            localStorage.removeItem('studioLogs');
            localStorage.removeItem('temp_img');
            localStorage.removeItem('temp_desc');
        }

        // Restore description in case system crashed out during camera view loads
        const savedDesc = localStorage.getItem('temp_desc');
        if (savedDesc) {
            descriptionInput.value = savedDesc;
        }

        // Restore image backup instantly
        const savedImg = localStorage.getItem('temp_img');
        if (savedImg) {
            currentImgBase64 = savedImg;
            preview.src = currentImgBase64;
            preview.style.display = 'block';
            cameraBtn.innerHTML = "<span>📷</span><span>Retake Photo</span>";
            galleryBtn.innerHTML = "<span>🖼|</span><span>Change Photo</span>";
        }

        renderLogs();
        validateForm();
        
        const savedEndTime = localStorage.getItem('unlockEndTime');
        if (savedEndTime && parseInt(savedEndTime) > Date.now()) {
            unlockEndTime = parseInt(savedEndTime);
            statusCard.classList.add('unlocked');
            statusTitle.textContent = "Distractions Unlocked";
            updateTimerUI();
            timerInterval = setInterval(updateTimerUI, 1000);
        }
    });

    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js').catch(function(err) {
            console.log("Service Worker registration failed: ", err);
        });
    }
</script>
</body>
</html>
