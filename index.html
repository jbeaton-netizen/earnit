<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EarnIt - Creative Focus Tracker</title>
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <style>
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --accent-teal: #00a896;
            --accent-orange: #f07167;
            --text-main: #ffffff;
            --text-muted: #a0a0a0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .app-container {
            width: 100%;
            max-width: 450px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .status-card {
            background-color: var(--card-bg);
            border-radius: 16px;
            padding: 20px;
            text-align: center;
            border: 2px solid var(--accent-orange);
            transition: all 0.3s ease;
        }

        .status-card.unlocked {
            border-color: var(--accent-teal);
        }

        .timer-display {
            font-size: 3rem;
            font-weight: bold;
            margin: 10px 0;
        }

        .upload-section {
            background-color: var(--card-bg);
            border-radius: 16px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .camera-btn {
            background-color: #2a2a2a;
            border: 2px dashed #444;
            color: var(--text-muted);
            border-radius: 12px;
            padding: 30px 20px;
            text-align: center;
            cursor: pointer;
            font-weight: 500;
        }

        #camera-input { display: none; }

        .preview-img {
            width: 100%;
            max-height: 250px;
            object-fit: cover;
            border-radius: 12px;
            display: none;
        }

        textarea {
            background-color: #2a2a2a;
            border: 1px solid #444;
            color: var(--text-main);
            border-radius: 12px;
            padding: 12px;
            font-family: inherit;
            resize: none;
            height: 80px;
        }

        button.action-btn {
            background-color: var(--accent-teal);
            color: white;
            border: none;
            border-radius: 12px;
            padding: 14px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
        }

        button.action-btn:disabled {
            background-color: #333;
            color: #666;
            cursor: not-allowed;
        }

        .archive-section {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .log-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }

        .log-card {
            background-color: var(--card-bg);
            border-radius: 12px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .log-card img {
            width: 100%;
            height: 120px;
            object-fit: cover;
        }

        .log-details {
            padding: 10px;
            font-size: 0.85rem;
        }

        .log-date {
            color: var(--accent-teal);
            font-size: 0.75rem;
            margin-bottom: 4px;
        }

        /* Diagnostic Panel */
        .debug-panel {
            background-color: #311;
            border: 1px solid #f66;
            color: #fbb;
            border-radius: 12px;
            padding: 15px;
            font-size: 0.85rem;
            display: none;
            flex-direction: column;
            gap: 8px;
        }
    </style>
</head>
<body>

<div class="app-container">
    <div id="debugPanel" class="debug-panel">
        <strong>⚠️ App Diagnostic Log:</strong>
        <div id="debugText"></div>
        <button onclick="document.getElementById('debugPanel').style.display='none'" style="background: #522; color: white; border: none; padding: 4px; border-radius: 6px; cursor: pointer;">Dismiss Log</button>
    </div>

    <div id="statusCard" class="status-card">
        <h2 id="statusTitle">Distractions Locked</h2>
        <div id="timerDisplay" class="timer-display">15:00</div>
        <p id="statusMsg" style="color: var(--text-muted); margin: 0;">Submit an art proof to earn 15 minutes.</p>
    </div>

    <div id="uploadSection" class="upload-section">
        <h3>Submit Studio Progress</h3>
        <label for="camera-input" class="camera-btn" id="uploadLabel">
            📷 Snap or Choose Photo
        </label>
        <input type="file" id="camera-input" name="camera-input" accept="image/*">
        <img id="preview" class="preview-img" alt="Progress preview">
        <textarea id="description" placeholder="What are you working on right now?"></textarea>
        <button id="submitBtn" class="action-btn" disabled>Submit Proof & Unlock</button>
    </div>

    <div class="archive-section">
        <h3>On-Device Studio Archive</h3>
        <div id="logGrid" class="log-grid"></div>
    </div>
</div>

<script>
    let timerInterval;
    let unlockEndTime;
    let currentImgBase64 = null;

    const cameraInput = document.getElementById('camera-input');
    const preview = document.getElementById('preview');
    const uploadLabel = document.getElementById('uploadLabel');
    const descriptionInput = document.getElementById('description');
    const submitBtn = document.getElementById('submitBtn');
    const statusCard = document.getElementById('statusCard');
    const statusTitle = document.getElementById('statusTitle');
    const timerDisplay = document.getElementById('timerDisplay');
    const statusMsg = document.getElementById('statusMsg');
    const logGrid = document.getElementById('logGrid');
    const debugPanel = document.getElementById('debugPanel');
    const debugText = document.getElementById('debugText');

    function logError(msg) {
        debugPanel.style.display = 'flex';
        debugText.textContent = msg;
        console.error(msg);
    }

    // Direct listener to prevent stand-alone PWA label-to-input click bubble failures on iOS
    uploadLabel.addEventListener('click', (e) => {
        e.preventDefault();
        cameraInput.click();
    });

    // Auto-save description as they type so they don't lose it if phone camera triggers a page refresh
    descriptionInput.addEventListener('input', () => {
        localStorage.setItem('temp_desc', descriptionInput.value);
        validateForm();
    });

    cameraInput.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (file) {
            uploadLabel.textContent = "⚙&#xFE0F; Processing Image...";
            
            // iOS Crash Protection: Use lightweight Object URLs instead of heavy Base64 parsing on camera returns
            let blobUrl;
            try {
                blobUrl = URL.createObjectURL(file);
            } catch (blobErr) {
                logError("Object URL initialization failed, attempting fallback file reader.");
                fallbackRead(file);
                return;
            }

            const img = new Image();
            img.onload = function() {
                try {
                    const canvas = document.createElement('canvas');
                    let width = img.width;
                    let height = img.height;
                    
                    const MAX_WIDTH = 500; 
                    const MAX_HEIGHT = 500;
                    
                    if (width > height) {
                        if (width > MAX_WIDTH) {
                            height *= MAX_WIDTH / width;
                            width = MAX_WIDTH;
                        }
                    } else {
                        if (height > MAX_HEIGHT) {
                            width *= MAX_HEIGHT / height;
                            height = MAX_HEIGHT;
                        }
                    }
                    
                    canvas.width = width;
                    canvas.height = height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);
                    
                    currentImgBase64 = canvas.toDataURL('image/jpeg', 0.50); // High-density compression
                    URL.revokeObjectURL(blobUrl); // Instantly free browser cache RAM

                    // Save preview to local cache so memory reloads recover gracefully
                    try {
                        localStorage.setItem('temp_img', currentImgBase64);
                    } catch (quotaErr) {
                        console.warn("Storage quota exceeded, deleting oldest log to free space.");
                        let tempLogs = JSON.parse(localStorage.getItem('studioLogs')) || [];
                        if (tempLogs.length > 0) {
                            tempLogs.pop();
                            localStorage.setItem('studioLogs', JSON.stringify(tempLogs));
                        }
                        localStorage.setItem('temp_img', currentImgBase64);
                    }

                    preview.src = currentImgBase64;
                    preview.style.display = 'block';
                    uploadLabel.textContent = "🔄 Change Photo";
                    validateForm();
                } catch (canvasErr) {
                    logError("Canvas compression failed, attempting legacy raw file fallback: " + canvasErr.message);
                    fallbackRead(file);
                }
            };
            img.onerror = function() {
                logError("Failed to convert binary file into image object, attempting legacy fallback reader.");
                fallbackRead(file);
            };
            img.src = blobUrl;
        }
    });

    function fallbackRead(file) {
        const reader = new FileReader();
        reader.onload = function(event) {
            currentImgBase64 = event.target.result;
            preview.src = currentImgBase64;
            preview.style.display = 'block';
            uploadLabel.textContent = "🔄 Change Photo";
            validateForm();
        };
        reader.onerror = function() {
            logError("Both compression pipeline and fallback file reader failed on this image.");
            uploadLabel.textContent = "❌ Load Error";
        };
        reader.readAsDataURL(file);
    }

    function validateForm() {
        submitBtn.disabled = !(currentImgBase64 && descriptionInput.value.trim().length > 0);
    }

    submitBtn.addEventListener('click', () => {
        try {
            if (!currentImgBase64 || !descriptionInput.value.trim()) return;

            const now = new Date();
            const dateStr = now.toLocaleDateString() + ' ' + now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

            const newLog = {
                id: Date.now(),
                date: dateStr,
                image: currentImgBase64,
                description: descriptionInput.value.trim()
            };

            saveLogToLocalStorage(newLog);
            startUnlockTimer();
            resetForm();
        } catch (submitErr) {
            logError("Submit action triggered exception: " + submitErr.message);
        }
    });

    function resetForm() {
        currentImgBase64 = null;
        preview.style.display = 'none';
        preview.src = '';
        uploadLabel.textContent = "📷 Snap or Choose Photo";
        descriptionInput.value = '';
        submitBtn.disabled = true;
        cameraInput.value = '';
        localStorage.removeItem('temp_desc');
        localStorage.removeItem('temp_img');
    }

    function startUnlockTimer() {
        clearInterval(timerInterval);
        statusCard.classList.add('unlocked');
        statusTitle.textContent = "Distractions Unlocked";
        statusMsg.textContent = "Enjoy your 15-minute break window.";
        
        unlockEndTime = Date.now() + (15 * 60 * 1000);
        localStorage.setItem('unlockEndTime', unlockEndTime);

        updateTimerUI();
        timerInterval = setInterval(updateTimerUI, 1000);
    }

    function updateTimerUI() {
        const remaining = unlockEndTime - Date.now();

        if (remaining <= 0) {
            clearInterval(timerInterval);
            statusCard.classList.remove('unlocked');
            statusTitle.textContent = "Distractions Locked";
            timerDisplay.textContent = "15:00";
            statusMsg.textContent = "Submit an art proof to earn 15 minutes.";
            localStorage.removeItem('unlockEndTime');
            return;
        }

        const minutes = Math.floor(remaining / 60000);
        const seconds = Math.floor((remaining % 60000) / 1000);
        timerDisplay.textContent = `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
    }

    function saveLogToLocalStorage(log) {
        let logs = JSON.parse(localStorage.getItem('studioLogs')) || [];
        logs.unshift(log);
        
        try {
            localStorage.setItem('studioLogs', JSON.stringify(logs));
        } catch (e) {
            logError("Local storage quota limit reached. Auto-removing oldest studio log to save new proof.");
            if (logs.length > 1) {
                logs.pop(); // Discard oldest entries
                try {
                    localStorage.setItem('studioLogs', JSON.stringify(logs));
                } catch (retryErr) {
                    logError("Severe LocalStorage failure: " + retryErr.message);
                }
            }
        }
        renderLogs();
    }

    function renderLogs() {
        try {
            let logs = JSON.parse(localStorage.getItem('studioLogs')) || [];
            logGrid.innerHTML = '';
            
            logs.forEach(log => {
                const card = document.createElement('div');
                card.className = 'log-card';
                card.innerHTML = `
                    
                    
                        ${log.date}
                        ${escapeHtml(log.description)}
                    
                `;
                logGrid.appendChild(card);
            });
        } catch (renderErr) {
            logError("Archive render failed: " + renderErr.message);
        }
    }

    function escapeHtml(text) {
        return text.replace(/&/g, "&").replace(//g, ">");
    }

    window.addEventListener('DOMContentLoaded', () => {
        // Self-repair logic to wipe any corrupted data structures from previous prototyping attempts
        try {
            const rawLogs = localStorage.getItem('studioLogs');
            if (rawLogs) {
                const parsed = JSON.parse(rawLogs);
                if (!Array.isArray(parsed)) throw new Error();
            }
        } catch (repairErr) {
            console.warn("Wiping corrupted log databases.");
            localStorage.removeItem('studioLogs');
            localStorage.removeItem('temp_img');
            localStorage.removeItem('temp_desc');
        }

        // Restore description in case page was reloaded by camera system usage
        const savedDesc = localStorage.getItem('temp_desc');
        if (savedDesc) {
            descriptionInput.value = savedDesc;
        }

        // Restore image backup if iOS crashed the page memory when opening camera
        const savedImg = localStorage.getItem('temp_img');
        if (savedImg) {
            currentImgBase64 = savedImg;
            preview.src = currentImgBase64;
            preview.style.display = 'block';
            uploadLabel.textContent = "🔄 Change Photo";
        }

        renderLogs();
        validateForm();
        
        const savedEndTime = localStorage.getItem('unlockEndTime');
        if (savedEndTime && parseInt(savedEndTime) > Date.now()) {
            unlockEndTime = parseInt(savedEndTime);
            statusCard.classList.add('unlocked');
            statusTitle.textContent = "Distractions Unlocked";
            updateTimerUI();
            timerInterval = setInterval(updateTimerUI, 1000);
        }
    });

    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js').catch(function(err) {
            console.log("Service Worker registration failed: ", err);
        });
    }
</script>
</body>
</html>
